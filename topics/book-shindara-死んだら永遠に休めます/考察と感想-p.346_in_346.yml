      予想: 生きて失踪している。ノアを誘拐している。
      真相: 死んでいた。
      理由:
        - 最終的に部下への壮大な嫌がらせでした、と言う展開に思える。今は。
        - 部下の誰かを殺人犯にするとは思えない。
