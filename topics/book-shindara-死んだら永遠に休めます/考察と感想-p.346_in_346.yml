    - なぞ: ーーーで上下を挟まれた文章が二箇所出てきたが、これはなに？
      予想:
        - 前川の視点なのではないか。出てくる女性はコンカフェのノアではないか。
          >>  前川ではない
        - 仁菜ちゃんの視点で、青瀬をみている。時系列は数年前。
      理由:
        - 最初、仁菜の話の直後におくことで青瀬の独白かとミスディレクションしていたが、１人称は私としか言っていない。
        - 2回目の部分で、戦闘体制を解けない、と言う表現が出てきて、前川だと思った
          >>  前川ではなかった
    - なぞ: 仁菜ちゃんは何者か
      予想:
        - 労基みたいな組織から来た潜入捜査職員（可能性薄いか）
        - 青瀬になんらかの憧れを持った女性。青瀬を助けるために派遣会社から職場に入ってきた
      理由:
        - 青瀬にだけやさしい
        - 本当は賢いのにバカのふりをしていた
    - なぞ: 仁菜ちゃんが示す仮説２は何か。そして青瀬にとって不都合で正しい世界とは何か。
      予想:
        - 経営総合統括本部の3人は前川の犯行にできなかった時の保険として、青瀬の犯行にできる可能性を残していた
          それは、同じ境遇の仲間だと思っていた人たちが、仲間でもなんでもなかったと言う不都合な世界？
        - 記憶を失っているだけで、なんらかの形で青瀬が今回の犯行に関わっている
      理由:
        - 仮説１が経営総合統括本部のうち３人が真相を知っていた
    - なぞ: 前川の人物像
      予想: 実は自分に自信がなく、会社の中で生き残るために、戦わなければならず、その結果がパワハラになっていた。
      真相: ただただそのままだった。外に媚び、内に横暴で、利害関係者に利益誘導してゆする、好きな女性に付きまとう、ただの最低な人物だった。
      理由:
        - コンカフェ店員からの印象が、オドオドしていた
        - ーーーが前川の独白なら
