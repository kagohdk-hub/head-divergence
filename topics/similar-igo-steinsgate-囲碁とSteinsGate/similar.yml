外観: |
  囲碁の検討が、SteinsGateの運命に抗う感じと似てる。
比較:
  SteinsGate:
    1: 何をしてもまゆりが死んでしまう。
    2: もっと手前のDメールを戻すことでまゆりの死を回避できる。
    3: まゆりの死を回避すると、紅莉栖が死ぬ。
    4: 紅莉栖の死を偽装することで二人ともの死を回避するルートへ、神回
  囲碁:
    1: どこから打ってもこの石が死んでしまう。
    2: もっと手前から検討すると、この1手が原因だとわかる。
    3: こちらの石を助けると、別の石が死ぬ。
    4: どちらも助けるための妙手を思いついた時が、神
