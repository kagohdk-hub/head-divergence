本情報:
  - タイトル: 「話せばわかる」は、本当か?
  - value books url: https://www.valuebooks.jp/bp/VS0063299928
  - youtube url: https://www.youtube.com/watch?v=hcloCbTQS94
話の流れ: |
  油断すると相手を詰めてる感じになる

  事例
    やり取り
      社員の健康管理をする企画がある
      部下: ちょっとお時間よろしいでしょうか、この前の件、まずアンケート調査をしようと思います
      上司: で、アンケートとってどうするの？
      部下: アンケートって取らない方がいいですかね
      上司: そんなの自分で考えてよ
      部下: すいません、失礼します。
    ヒアリングした結果
      上司: 部下は自分の頭で考えていない
      部下: 上司のスピードが早くて思考が止まる
    一般論
      上司はもっと部下の話に耳を傾けよう
      部下は上司を説得する材料を集めてから報告しよう
    しかし本当か
      二人が気が利かないのか
      どちらかの仕事能力が低いのか
      そういうことではなく、
      話し方やものの考え方が違う。

      結論から話すは本当に正しいか という観点にも及ぶ

  人間の話し方(考え方)を大別する
    広げるモード
      わかりやすく, 感情を込めて, 工夫して話す    
    まとめるモード
      正確に話す, 根拠を明らかに話す, 時系列で話す

  一人の人間が両方のモードを持っていて使い分けているが、
  どちらのモードを優先して使うかは人によって違う。

  判定
    好きな方を選べ
    - a: 結論を先に言われる
      b: 順序立てて言われる
    - a: 要点をかいつまんで言われる
      b: 全ての情報を言われる
    - a: 面白く話してもらう
      b: 正確に話してもらう
    
    aが2個以上 = 広げるモードが強い傾向
    bが2個以上 = まとめるモードが強い

  特徴-利点
    広げるモード
      映像化が得意, 情景が浮かぶ
      それにより 思考の順序をスキップできる
      話の価値基準は 面白さ
    まとめるモード
      情報を順番に並べて
      不足や矛盾を見つけるのが得意
      話の価値基準は 正確さ

  判定することが重要なのではなく、
  重要なのは、そのような傾向が存在するという視点を持つことが重要

  飯田さんの実例
    本のタイトルを決めよう
    編集者: こんなタイトルはどうですか
    飯田: タイトルの中のこの単語の意味がしっくりこない、どういう意味でしたっけ
    編集者: 改めてどういう本を作ろうとしているか、企画の趣旨から説明します
    飯田: (それそんな興味ない...) 結論だけください!

  相手のモードの見抜き方
    人の話を聞きながら、うんうんと頷く人 : 広げるモードの可能性が高い
      こちらはまだ全体像を伝えていないのに頻繁に頷くのは、結論を求めているサインです
      うんうん -> わかったよ の意味
    ほとんど動かずに話を聞いているとき : まとめるモードの可能性が高い
  
  飯田の事例
    相手から、うんうん の相槌がないと、伝わっていないと思って足しちゃう
      # 自分にも、足された記憶がある。
    この言い方で伝わらないなら別の言い方にしよう！

    結果、相手はじっくり聞いているだけなのに、情報をたされている。
  
  結論から話すは正しいのか
    結論から話すは、未来に目が向いている。
    広げるモードによった話し方。
  
    情報は三つに分ける : 現状 , 思い , 結論

    広げるモードの人には : 結論 > 現状 > 思い の順で話すのが良い
    まとめるモードの人には : 現状 > 思い > 結論 の順で話すのが良い

    事例
      テーマ
        とある会社で、窓口業務が多すぎて個々の社員の作業が全く進まない。
        経営幹部は、火曜日の午前中は窓口を閉めて作業に集中できるようにすることを決めた。
      これをどういうふうに伝えるか
      広げるモードに伝わりやすい流れ
        結論: 来月から、毎週火曜日のAMは窓口を閉め、社内作業に専念できるようにします。
        現状: アンケート調査から、窓口対応で作業が中断される悩みを持つ社員が多いことがわかった。
        思い: 当社は個人の作業に集中できる環境を作りたいと思っている。
      まとめるモードに伝わりやすい流れ
        現状: アンケート調査から、窓口対応で作業が中断される悩みを持つ社員が多いことがわかった。
        思い: 当社は個人の作業に集中できる環境を作りたいと思っている。
        結論: 来月から、毎週火曜日のAMは窓口を閉め、社内作業に専念できるようにします。

  想いを伝えるの大事
    事例: プール教室の値上げ
      子供が通っているプール教室が値上げすることになった。
      お知らせのチラシに、理由と結論だけ書いてあった。
      値上げしないと大変なんですとか、値上げした分子供達に還元したいと思っています
      といった思いが、嘘でもいいから書いてくれないと気分が悪いんだよな

      という会話が直近であった。（飯田談）

    事例: コピー機の実験
      コピー機を使っている人に対して
      先に使わせてください  だけをいうと断られる
      急ぎの用事があり早く使いたいので使わせて下さい  だと承諾率上がる
      コピー機を先に使いたいので先に使わせてください  でも承諾率が上がる

      なんもいってないのと同じなのに

  最初の事例というのは、
    順番にやろうとしたのに、ゴールを聞かれたから、思考が追いつかなくなった
    ということ
  広げるモードの人が、まとめるモードの人と話すときに気をつけるべきこと
    10秒黙る
    10秒黙れば向こうから話し出すから黙っておくべき
  
  広げるモードが極端な人の 本質病
    事例
      上司: この前の資料送られてきていないが何があった？
      部下: ちょっと確認しようと思って遅れてしまった
      上司: 何か資料に問題があった？
      部下: すみません、先方の修正があったので反映後確認しようと思った。判断ミスでした。
      上司: 攻めてるわけではなく、問題があったならその箇所を教えて欲しい。
      部下: すみません、できるだけ早く確認します。

    # ものすごく心当たりがある。

    部下: 責められたと思っている
    上司: 状況を確認したいだけ

    広げるモードの人は  資料に問題があった？  という主要な問題について聞いている
    まとめるモードの人は  先方から修正があって  という経緯を伝えようとしている

    部下の最後の、すみません の意味は謝罪ではない
    自分では納得してくれる答え方がわからない という意味
    # 一定腹落ちする部分はある。

    動画内の解釈
      経緯を伝えたのに不満そう、何が不満なのかわからないが、それを聞き返すのも難しい
      と思った結果、すみませんといって会話を放棄する
    自分の解釈
      きっと伝えるべきことを伝えるべき形式で伝えられていないが、
      何を修正すれば伝わるのかわからないが、それを聞くのは難しい
      と思った結果、すみませんといって会話を放棄する
    
  まとめるモードの人は、正確さや、多くの人に見せても問題がないかに意識が向きがち
    # 自分はこれが極端に強いと感じる

  飯田談
    自分が結論から話しているとき、
    半分くらいは、結論しか話していない。
    その結論に至るまでの、経緯や考え方を後から伝えることなく雑に仕事を振っている
  
  違いがあるからこそ仕事は進む
    広げるモードの人だけだと  : 会議は盛り上がるが、面白かったで終わる
      アイディアがたくさん出るだけ出て、何も決まらない。
      まとめるモードの人がいると、それってもう決定ですか？と水を指してくる
      （現実に戻してくる）
    逆に、
    まとめるモードの人だけだと   : 未来に視点を置いて新しいことをやる機運にならない
      去年はどうしてたっけ、じゃあ今年も
      となる

  自分の中でも切り替えないと仕事は進まないよ
    # 切り替えができていない
    まとめるモードになりたいとき:
      「つまり」「要するに」から言い始めてみる。まとめる方向に進みやすくなる。
    広げるモードになりたいとき:
      「じゃあ」「たとえば」といってみる。次に進みやすくなる。

  褒め方や声の掛け方も違う
    期待してるよ は気をつけろ
      広げるモードの人 : 期待してるよ >> テンションが上がる
      まとめるモードの人 : 期待してるよ >> なにを？

      となる（相手のモードを見誤ると、予期せぬ反応を受けるということ）

      まとめるモードをほめるなら
      「この部分はいいね」と具体例を挙げて、抽象的に褒めないようにする
  
  単純化について
    人間を２パターンに分けるような  単純化  には取り扱いに注意が必要
      全てをその目で見てしまって、あいつは広げるモードだからまとめることはできない
      となる。
    逆に、単純化は重要でもある。理解の助けになる。
      mbti診断のように細分化していくほど良いように思うが
      ぶっちゃけ覚えていられない。

      また、人間を1つにまとめる方がよっぽど危ない。
        こうあるべき。こうでないならダメ。となる。

考察:
- idea: |
    エクセルで、現状、思い、結論 のセルを作成し、
    読む人のモードによって、2つソート列を作っておく
- 考察:
    - まとめるモードと、広げるモードの人物像が、言葉とは逆のようにも思えた
    - まとめるモードに陥る人は、ほっといたら広がるからまとめる方向に力を加え
      広げるモードに偏る人は、ほっといてもまとめることができる自信があるから気楽に広げる方向に行く
      というパターンも考えられると思った。
    - もちろん単純に、広げるのが好きとか、まとめるのが好きとかの人もいるだろうけど。
