title: 躁鬱を自動車で例える

---

メタファー:
  例え:
    全体像: |
      躁鬱の状態を、高速道路を走る自動車に例える。
      ただし、その世界ではエンジン音は聞こえない。
    例えの対象:
      自動車: 人（特に外側から見た人）
      運転手: 人の中身
      高速道路の本線: 60-120km/hで走ることを要求される社会
      パーキングエリア: 休む場所
  状態:
    躁状態:
      イメージ: アクセルをちょっと踏むだけでエンジンがすごく回転してスピードが出る
      燃料タンク状態: 本人の感覚以上に燃料を消費している
      エンジン状態: 気づかないうちにエンジン自体にもダメージが入っている
      社会の中での姿: 本線で他の車にぶつかりまくる
      自他の認識の差:
        - 自分の回転数やスピードを正確に把握できない（計器が壊れている）
        - 本人は「ちょっとアクセルを踏んでいるだけ」と感じているが、周囲からは「速すぎる車」に見えている

    鬱状態:
      イメージ: アクセルを踏んでも踏んでもエンジンが全然回らずスピードが出ない
      燃料タンク状態: 燃料が空になっている
      エンジン状態: 躁状態や一般社会での無理で酷使したことにより、エンジン自体がダメージを受け出力が出づらくなっている
      社会の中での姿: 本線で最低速度を守ろうとベタ踏みするが、周囲からは遅く見える
      自他の認識の差:
        - 自分の回転数やスピードを正確に把握できない（計器が壊れている）
        - 本人は全力なのに、外からは「遅い車」にしか見えない

    躁状態から鬱状態への切り替わり:
      イメージ: 限界に自分では気づけないため、パーキングに入れず本線でいきなりスピードが出なくなる
      key_point: 意図的に休む選択肢がそもそも取れない

  回復の罠:
    イメージ: 燃料やエンジンが回復したと感じた時に頑張ろうとするとまたふかしすぎる
    メカニズム: 軽躁状態を「元気になった」と誤認しやすい

  アクセルとブレーキ:
    躁状態: ブレーキが効かない
    鬱状態: アクセルを踏んでもブレーキが勝つ
    note: アクセルとブレーキの両方が壊れている非対称な状態

  パーキングエリア:
    本来の役割: 本線（社会）から離れて休む場所
    鬱状態の状況:
      イメージ: パーキングに入っても休めない
      メカニズム: |
        「本線にすぐ戻らなければ」というプレッシャーから、エンジンを冷やせない。
        再始動できるようにニュートラルギアで回転数を上げ続ける＝ニュートラルでものすごくふかしている状態。
        止まっているように見えてエネルギーだけ消費している。
      外から見ると: 他人からはなぜエンジンを切らないのか理解されない
      中では: |
        エンジンを切れる人は「いつでも再始動できる」という自信がある人だけ。
        その自信がないから切れない。怠けや非効率ではなく生存戦略。

  エンジン音がないということ:
    イメージ: 自動車の例えで唯一確実に違う点
    理想: エンジンが唸りを上げていれば周囲も本人も気づける
    実際: |
      完全に無音。
      外から見えないだけでなく、本人にも聞こえない。
      計器も壊れていて、音もしない。
      「なぜ気づかないの」と言われても気づく手段がない。

  車の外殻:
    イメージ: 自動車の扉は外と内を隔てる
    metaphor: |
      扉を開けないとアクセルを踏み込んでいるかどうかもわからない。
      内側の状態は外からは見えない。
      この隔たりも躁鬱の見えにくさをよく表している。
