--:
  構造:
    前提:
    main予測結果:
    subシナリオ:
      - シナリオ_n:
          予測結果:
    実測結果:
    評価:
      評価パターン:
        - 想定外に予想以上
        - 想定内だが予想以上
        - 概ね予想通り
        - 想定内だが予想以下
        - 想定外に予想以下
      考察:
        - こうしていたらこうだっただろう
        - こうなった原因はこれだろう
    評価実施トリガー:
      - 日付
      - その他の条件
    予測日:
    結果確認日:
  メモ:
    - 初期値も前提。自分の行動も前提。
    - 予測をしたら変更してはいけない。変更したいなら、変更するのではなく、追加する。
  データとしての構造:
    汎用:
      - head: 1行ヘッダー
    株式予測:
      - head: 1行ヘッダー
  期待効果: |
    計画性のような脅迫感がなく単に予測する。
    いい予測のようにはなりたいし、悪い予測は避けたい
    という気持ちが自然と起こる気がする。
  活用案:
    - 株式の価格変動:
        結果評価トリガー:
    - もし＊＊したら＊＊になるだろう:
        パターン:
          - もしペットボトルを持って帰らないというルールを作ったら、家の中のゴミが減るだろう
        制限:
          - 実際にその時になり得る前提でなければ、いけない。
    - 遊びの計画:
        パターン:
          - ＊＊したら楽しいだろう
          - ＊＊したら楽しんでもらえるだろう
          - ＊＊に行ったら
    - コンテンツの考察:
        パターン:
          - この先の展開は＊＊になるだろう
          - このようになった原因は＊＊だろう
        制限:
          - 予測が外れることも含めて楽しめるなら、やる意味がある。
