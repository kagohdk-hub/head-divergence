  仕事:
    1: たくさん仕事ができた方がえらい雰囲気がある。
    2: しかし、本質的にたくさん仕事ができた方が良いということもない。
    3: 自分のキャパを超えて仕事をすると潰れる
    4: 潰れると人に迷惑をかける
    5: 自分のキャパを知っておくことが大人になると大事
