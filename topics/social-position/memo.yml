- topic: 世界を階層モデルで表すと
  layer model:
    - 客層
    - 出役層
    - 管理層
    - さらに裏方  or  ものづくり層
- あらゆるビジネスが、このモデルに当てはめるとどのようになるのか
- ITやプログラミングというのは、管理層のさらに裏方に当たる
  あらゆるところに存在するように見えて、どこにもいないようにも見える。
  どんなにやっても、実際に動くということには変えられない。
- 例:
  - 飲食店:
    - 客層: お客さん
    - 出役層: 店員
    - 管理層: 店長
    - 裏方:
        - [料理人, 仕入れ担当, 清掃担当]
        - [食器メーカー, 食材メーカー, 清掃用品メーカー]
  - ソフトウェア開発:
    - 客層: ユーザー
    - 出役層: [フロントエンドエンジニア, カスタマーサポート]
    - 管理層: [プロジェクトマネージャー, プロダクトマネージャー]
    - 裏方:
        - [バックエンドエンジニア, インフラエンジニア, QAエンジニア]
